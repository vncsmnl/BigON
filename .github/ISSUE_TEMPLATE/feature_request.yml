name: 🚀 Feature Request (Sugestão de Funcionalidade)
description: Sugira uma nova funcionalidade, suporte a padrões de código ou melhoria para a extensão BigON.
title: "[FEATURE]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Obrigado por contribuir com o desenvolvimento do BigON!

        Suas sugestões ajudam a melhorar a análise de complexidade, aumentar a cobertura de padrões de código e tornar a experiência no editor cada vez melhor.

        Antes de enviar:
        - Verifique se já existe uma issue semelhante.
        - Explique o problema que a funcionalidade resolve sempre que possível.

  - type: dropdown
    id: category
    attributes:
      label: 🏷️ Categoria da Sugestão
      description: Qual área da extensão essa sugestão afeta?
      options:
        - Novo padrão de código / AST
        - Melhoria no cálculo de complexidade
        - Suporte a nova linguagem
        - Melhoria no CodeLens
        - Interface / Experiência do Usuário
        - Outro
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problema ou Limitação Atual
      description: Descreva o problema, limitação ou cenário que motivou esta sugestão.
      placeholder: |
        Exemplo:
        Atualmente estruturas `do-while` não são identificadas pelo analisador de AST,
        causando resultados incorretos na análise de complexidade.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 🎯 Solução Proposta
      description: Descreva como você imagina que essa funcionalidade deveria funcionar.
      placeholder: |
        Exemplo:
        Adicionar suporte ao nó `DoStatement` da AST e considerar o laço
        no cálculo da complexidade temporal.
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: 📈 Benefícios Esperados
      description: Explique qual impacto positivo essa melhoria traria.
      placeholder: |
        Exemplo:
        Permitir análises mais precisas em projetos que utilizam esse padrão.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternativas Consideradas
      description: Descreva outras soluções ou abordagens que você considerou.
      placeholder: |
        Exemplo:
        Criar uma regra separada para esse tipo de estrutura.
    validations:
      required: false

  - type: textarea
    id: code_example
    attributes:
      label: 📄 Exemplo de Código / Caso de Uso
      description: Caso envolva análise de código, forneça um exemplo mínimo em TypeScript ou JavaScript.
      render: typescript
      placeholder: |
        function example(items: number[]) {
          do {
            console.log(items);
          } while (items.length > 0);
        }
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 🔗 Referências ou Exemplos
      description: Adicione links, documentação, ferramentas similares ou exemplos que possam ajudar.
      placeholder: |
        Exemplo:
        - Documentação oficial
        - Implementação semelhante em outra ferramenta
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 📝 Contexto Adicional
      description: Adicione qualquer outra informação, imagem ou detalhe relevante.
    validations:
      required: false
