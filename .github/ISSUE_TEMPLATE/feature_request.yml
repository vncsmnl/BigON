name: Feature Request (Sugestão de Funcionalidade)
description: Sugira uma nova ideia, suporte a novo padrão ou melhoria para a extensão BigON.
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por sugerir melhorias para o BigON! Suas ideias ajudam a tornar a análise de complexidade cada vez mais completa.

  - type: textarea
    id: problem
    attributes:
      label: Qual problema ou limitação sua sugestão resolve?
      description: Uma descrição clara do problema ou de padrões de código que atualmente não são analisados corretamente.
      placeholder: "Ex: Atualmente laços do tipo 'do-while' não são reconhecidos pelo analisador de AST..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Solução Proposta
      description: Descreva detalhadamente a funcionalidade ou comportamento que você gostaria de ver implementado.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      description: Descreva soluções ou abordagens alternativas que você considerou.
    validations:
      required: false

  - type: textarea
    id: code_example
    attributes:
      label: Exemplo de Código / Caso de Uso
      description: Se for suporte a um novo padrão de código, forneça um exemplo em TypeScript/JavaScript.
      render: typescript
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Contexto Adicional
      description: Adicione qualquer outra informação, imagens ou links relevantes sobre esta sugestão.
    validations:
      required: false
